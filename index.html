<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>BIMO Settings Popup</title>
</head>
<body class="bg-[#000] flex justify-center items-center h-screen">

  <!-- Settings Popup -->
  <div class="w-[320px] max-w-sm bg-black/70 backdrop-blur-xl border border-white/10 rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.05)] p-4 text-white space-y-4">
    
    <!-- Header -->
    <div class="flex justify-between items-center">
      <h2 class="text-base font-semibold tracking-wide">Settings</h2>
      <button class="text-white/60 hover:text-white transition">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>

    <div class="h-px w-full bg-white/10"></div>

    <!-- Setting Option: Profile -->
    <div class="flex items-center justify-between p-2 rounded-xl bg-white/5 hover:bg-white/10 transition">
      <div class="flex items-center gap-3">
        <i data-lucide="user" class="w-5 h-5 text-white/80"></i>
        <span class="text-sm">Edit Profile</span>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-white/40"></i>
    </div>

    <!-- Setting Option: Theme -->
    <div class="flex items-center justify-between p-2 rounded-xl bg-white/5 hover:bg-white/10 transition">
      <div class="flex items-center gap-3">
        <i data-lucide="palette" class="w-5 h-5 text-white/80"></i>
        <span class="text-sm">Appearance</span>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-white/40"></i>
    </div>

    <!-- Setting Option: Analytics -->
    <div class="flex items-center justify-between p-2 rounded-xl bg-white/5 hover:bg-white/10 transition">
      <div class="flex items-center gap-3">
        <i data-lucide="bar-chart-3" class="w-5 h-5 text-white/80"></i>
        <span class="text-sm">Analytics</span>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-white/40"></i>
    </div>

    <!-- Setting Option: Verification -->
    <div class="flex items-center justify-between p-2 rounded-xl bg-white/5 hover:bg-white/10 transition">
      <div class="flex items-center gap-3">
        <i data-lucide="badge-check" class="w-5 h-5 text-white/80"></i>
        <span class="text-sm">Verification</span>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-white/40"></i>
    </div>

    <!-- Setting Option: Content Protection -->
    <div class="flex items-center justify-between p-2 rounded-xl bg-white/5 hover:bg-white/10 transition group">
      <div class="flex items-center gap-3">
        <!-- Mini Post Icon (from your custom design) -->
        <div class="relative w-6 h-6">
          <div class="absolute top-[1px] -left-[1px] w-full h-full rounded bg-white/5 border border-white/10 scale-[0.9] blur-[0.3px]"></div>
          <div class="relative w-full h-full bg-black border border-white/20 rounded flex flex-col justify-between p-[2px] overflow-hidden">
            <div class="flex items-center gap-[2px]">
              <div class="w-[3px] h-[3px] bg-white/50 rounded-full"></div>
              <div class="h-[2px] w-[7px] bg-white/50 rounded-full"></div>
            </div>
            <div class="relative w-full flex-1 mt-[1px] bg-white/10 rounded border border-white/10 flex justify-center items-center">
              <i data-lucide="shield-check" class="text-white w-2 h-2 opacity-90"></i>
            </div>
          </div>
        </div>
        <span class="text-sm">Content Protection</span>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-white/40"></i>
    </div>

    <!-- Logout -->
    <div class="pt-2 border-t border-white/10">
      <button class="flex items-center justify-center gap-2 w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 text-sm py-2 rounded-xl transition">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        Logout
      </button>
    </div>

  </div>

  <script>
    lucide.createIcons();
  </script>
  <script src="app.js"></script>
</body>
</html>
